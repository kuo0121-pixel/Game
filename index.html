<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>柏宇的爬行大冒險 🍼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #f3ead7;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #5a4a36;
    overflow: hidden;
    touch-action: manipulation;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #wrap {
    position: relative;
    width: 100%;
    max-width: 880px;
    aspect-ratio: 16 / 9;
    /* JS sets explicit width/height as a fallback for iOS Safari < 15
       (which doesn't support aspect-ratio and would collapse to 0 height). */
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 14px 40px rgba(120, 96, 60, 0.28);
    background: #cfe9f0;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: rgba(243, 234, 215, 0.92);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    padding: 24px;
    gap: 14px;
  }
  .overlay.hidden { display: none; }
  .title {
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 800;
    color: #d98344;
    text-shadow: 0 2px 0 #fff;
    letter-spacing: 1px;
  }
  .subtitle { font-size: clamp(13px, 2.4vw, 17px); color: #8a7656; line-height: 1.7; max-width: 30em; }
  .baby-emoji { font-size: clamp(46px, 9vw, 78px); animation: bob 1.4s ease-in-out infinite; }
  .baby-avatar {
    width: clamp(96px, 20vw, 150px);
    height: clamp(96px, 20vw, 150px);
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    background-color: #fff;
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px #ffcf33, 0 8px 18px rgba(120,96,60,0.35);
    animation: bob 1.4s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-10px) rotate(3deg);} }
  .btn {
    margin-top: 6px;
    border: none;
    background: linear-gradient(#ffb169, #f08a3c);
    color: #fff;
    font-size: clamp(16px, 3vw, 20px);
    font-weight: 800;
    padding: 14px 38px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 0 #c96d28, 0 10px 18px rgba(201,109,40,0.4);
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c96d28, 0 4px 10px rgba(201,109,40,0.4); }
  .hint { font-size: clamp(12px, 2.2vw, 15px); color: #a8916c; }
  .stat-row { display: flex; gap: 26px; margin: 4px 0; flex-wrap: wrap; justify-content: center; }
  .stat { background: #fff7ea; border-radius: 14px; padding: 10px 18px; box-shadow: 0 3px 0 #e6d4b3; }
  .stat .num { font-size: clamp(22px, 4vw, 34px); font-weight: 800; color: #d98344; }
  .stat .lbl { font-size: 12px; color: #a8916c; margin-top: 2px; }
  .badge-line { font-size: clamp(13px,2.6vw,18px); color:#6b8e4e; font-weight:700; min-height: 1.4em; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; pointer-events: none;
    font-weight: 800;
  }
  #hearts { font-size: clamp(18px, 3.4vw, 26px); letter-spacing: 2px; }
  #score { font-size: clamp(16px, 3vw, 24px); color: #5a4a36; text-shadow: 0 1px 0 #fff; }
  #toast {
    position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.9); color:#6b8e4e; font-weight:800;
    padding: 8px 20px; border-radius: 999px; font-size: clamp(14px,2.8vw,19px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.12); opacity: 0; transition: opacity .3s, transform .3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
  #muteBtn {
    position:absolute; bottom:10px; right:12px; pointer-events:auto;
    background:rgba(255,255,255,0.75); border:none; border-radius:10px;
    padding:6px 10px; font-size:16px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="hearts">❤️❤️❤️</div>
    <div id="score">0 公分</div>
  </div>
  <div id="toast"></div>
  <button id="muteBtn" title="音效開關">🔊</button>

  <!-- Start screen -->
  <div id="start" class="overlay">
    <div class="baby-avatar" id="startFace"></div>
    <div class="title">柏宇的爬行大冒險</div>
    <div class="subtitle">
      8 個月大的柏宇在客廳裡開始爬行探險！<br>
      收集 🍼 奶瓶、🦷 固齒器、🧸 玩具，<br>
      閃避巡邏的 🤖 掃地機器人和散落的 🛋️ 抱枕。
    </div>
    <button class="btn" id="startBtn">開始爬行！</button>
    <div class="hint">電腦：空白鍵 / ↑ 跳　　手機：點畫面跳</div>
  </div>

  <!-- Game over screen -->
  <div id="over" class="overlay hidden">
    <div class="baby-avatar" id="overFace"></div>
    <div class="title" id="overTitle">柏宇累累要休息～</div>
    <div class="stat-row">
      <div class="stat"><div class="num" id="finalScore">0</div><div class="lbl">爬行距離 (公分)</div></div>
      <div class="stat"><div class="num" id="bestScore">0</div><div class="lbl">最佳紀錄</div></div>
    </div>
    <div class="badge-line" id="badgeLine"></div>
    <button class="btn" id="retryBtn">再爬一次！</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Canvas setup ----------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var W = 880, H = 495;            // internal logical resolution (16:9)
  var DPR = Math.min(window.devicePixelRatio || 1, 2);

  function fitCanvas() {
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  fitCanvas();

  // Explicitly size the game frame to a 16:9 box that fills the viewport.
  // Also a fallback for browsers without CSS aspect-ratio support
  // (notably iOS Safari < 15, where #wrap would otherwise collapse to 0 height).
  // On a portrait phone the 16:9 frame is tiny, so we rotate it 90° to fill
  // the screen sideways. Input is "tap anywhere to jump", which is
  // orientation-independent, so rotating the frame is safe.
  function sizeWrap() {
    var wrap = document.getElementById("wrap");
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var portrait = vh > vw;
    // When rotating, fit the landscape frame into the swapped dimensions.
    var availW = portrait ? vh : vw;
    var availH = portrait ? vw : vh;
    var width = Math.min(880, availW);
    var height = width * 9 / 16;
    if (height > availH) { height = availH; width = height * 16 / 9; }
    wrap.style.width = width + "px";
    wrap.style.height = height + "px";
    if (portrait) {
      // Take it out of flex flow and center+rotate it over the whole screen.
      wrap.style.position = "fixed";
      wrap.style.left = "50%";
      wrap.style.top = "50%";
      wrap.style.transform = "translate(-50%, -50%) rotate(90deg)";
    } else {
      wrap.style.position = "";
      wrap.style.left = "";
      wrap.style.top = "";
      wrap.style.transform = "";
    }
  }
  sizeWrap();

  // ---------- DOM ----------
  var startScreen = document.getElementById("start");
  var overScreen  = document.getElementById("over");
  var hud         = document.getElementById("hud");
  var heartsEl    = document.getElementById("hearts");
  var scoreEl     = document.getElementById("score");
  var toastEl     = document.getElementById("toast");
  var finalScoreEl= document.getElementById("finalScore");
  var bestScoreEl = document.getElementById("bestScore");
  var badgeLineEl = document.getElementById("badgeLine");
  var overTitleEl = document.getElementById("overTitle");
  var overFaceEl  = document.getElementById("overFace");
  var muteBtn     = document.getElementById("muteBtn");

  // ---------- Audio (tiny WebAudio blips) ----------
  var muted = false, audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
    }
    // iOS Safari starts the context "suspended"; it must be resumed inside a user gesture.
    if (audioCtx && audioCtx.state === "suspended") { audioCtx.resume(); }
  }
  function blip(freq, dur, type, vol) {
    if (muted || !audioCtx) return;
    var o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    g.gain.value = vol || 0.06;
    o.connect(g); g.connect(audioCtx.destination);
    var t = audioCtx.currentTime;
    g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  }
  muteBtn.addEventListener("click", function () {
    muted = !muted;
    muteBtn.textContent = muted ? "🔇" : "🔊";
  });

      if (!babyFaceReady) { babyFaceReady = true; currentFace = img; if (state === "start") idleRender(); }
    };
    img.src = src;
  });
  // Hero avatar on the start screen — use a clear baby close-up.
  var startFaceEl = document.getElementById("startFace");
  if (startFaceEl && BABY_FACES.length) {
    startFaceEl.style.backgroundImage = "url('" + BABY_FACES[BABY_FACES.length - 1] + "')";
  }
  var faceTimer = 0;
  function pickFace() {
    if (babyImgs.length) currentFace = babyImgs[(Math.random() * babyImgs.length) | 0];
  }
  function happyFace() {
    if (babyImgs.length && HAPPY_IDX.length) { currentFace = babyImgs[HAPPY_IDX[(Math.random() * HAPPY_IDX.length) | 0]]; faceTimer = 0.7; }
  }
  function upsetFace() {
    var ok = [];
    for (var i = 0; i < babyUpset.length; i++) if (babyUpset[i].complete) ok.push(babyUpset[i]);
    if (ok.length) { currentFace = ok[(Math.random() * ok.length) | 0]; faceTimer = 1.2; }
  }

  // ---------- Game constants ----------
  var GROUND_Y = H - 86;           // baby's crawling baseline (feet line)
  var GRAVITY  = 2200;             // px/s^2
  var JUMP_V   = -760;             // initial jump velocity
  var BASE_SPEED = 280;            // px/s world speed at start
  var MAX_SPEED  = 620;

  // Collectible & obstacle defs
  var COLLECTIBLES = [
    { emoji: "🍼", points: 10, name: "奶瓶" },
    { emoji: "🦷", points: 15, name: "固齒器" },
    { emoji: "🧸", points: 20, name: "玩具熊" },
    { emoji: "🟦", points: 25, name: "DDIC 晶片" }  // tech easter-egg item
  ];
  var OBSTACLES = [
    { emoji: "🤖", name: "掃地機器人", w: 56, h: 40 },
    { emoji: "🛋️", name: "抱枕沙發", w: 64, h: 46 }
  ];

  // Encouraging milestone messages (cute & warm)
  var MILESTONES = [
    { d: 200,  msg: "柏宇爬得好快！👏" },
    { d: 500,  msg: "扶站達人出現～🧍" },
    { d: 1018, msg: "10/18 生日寶寶！🎂" },   // birthday easter egg 2025/10/18
    { d: 1500, msg: "咿咿呀呀超開心！🗣️" },
    { d: 2500, msg: "爸媽都看呆了 😍" },
    { d: 4000, msg: "傳說中的爬行小冠軍 🏆" }
  ];

  // ---------- State ----------
  var state = "start";  // start | playing | over
  var baby, world, items, obstacles, particles, popups;
  var shake = 0, flash = 0;
  var skyGrad = null, dirtGrad = null, coinGlow = null;
  var score, dist, hearts, speed, spawnTimer, itemTimer, invuln, milestoneIdx, best;

  best = parseInt(localStorage.getItem("baiyu_best") || "0", 10) || 0;

  function reset() {
    baby = { x: 150, y: GROUND_Y, vy: 0, onGround: true, anim: 0, squash: 0 };
    world = { scroll: 0 };
    items = [];
    obstacles = [];
    particles = [];
    popups = [];
    shake = 0; flash = 0;
    score = 0; dist = 0; hearts = 3; speed = BASE_SPEED;
    spawnTimer = 1.2; itemTimer = 0.7; invuln = 0; milestoneIdx = 0;
    coolMode = false;
    pickFace();
    updateHUD();
  }

  function updateHUD() {
    heartsEl.textContent = "❤️".repeat(hearts) + "🤍".repeat(Math.max(0, 3 - hearts));
    scoreEl.textContent = Math.floor(dist) + " 公分";
  }

  // ---------- Input ----------
  function jump() {
    if (state !== "playing") return;
    if (baby.onGround) {
      baby.vy = JUMP_V;
      baby.onGround = false;
      baby.squash = 0.4;
      blip(520, 0.12, "square", 0.05);
      particles.push({ x: baby.x, y: GROUND_Y, ring: true, r0: 42, ml: 0.35, life: 0.35, vx: 0, vy: 0, g: 0, color: "rgba(255,255,255,0.85)" });
      for (var js = 0; js < 6; js++) { var ja = Math.PI + Math.random() * Math.PI, jp = 60 + Math.random() * 70; particles.push({ x: baby.x, y: GROUND_Y - 4, vx: Math.cos(ja) * jp, vy: Math.sin(ja) * jp, g: 200, life: 0.4, color: "#fff3b0", star: true, sz: 4 }); }
    }
  }
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
      e.preventDefault();
      if (state === "start") startGame();
      else if (state === "over") startGame();
      else jump();
    }
  });
  // Tap to jump. Bind to the whole wrap (not just the canvas) and handle
  // touchstart explicitly so iOS Safari reliably registers the tap and
  // doesn't treat it as a scroll/zoom gesture.
  var wrapEl = document.getElementById("wrap");
  function tapJump(e) {
    // Ignore taps on the real buttons / mute toggle so they keep their own handlers.
    if (e.target.closest && e.target.closest("button")) return;
    ensureAudio();
    if (state === "playing") { if (e.cancelable) e.preventDefault(); jump(); }
  }
  wrapEl.addEventListener("pointerdown", tapJump);
  wrapEl.addEventListener("touchstart", tapJump, { passive: false });

  document.getElementById("startBtn").addEventListener("click", function () { ensureAudio(); startGame(); });
  document.getElementById("retryBtn").addEventListener("click", function () { ensureAudio(); startGame(); });

  function startGame() {
    reset();
    state = "playing";
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
    hud.classList.remove("hidden");
    blip(660, 0.15, "triangle", 0.06);
    lastT = performance.now();
    requestAnimationFrame(loop);
  }

  // ---------- Toast ----------
  var toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1400);
  }

  // ---------- Spawning ----------
  function spawnObstacle() {
    var o = OBSTACLES[(Math.random() * OBSTACLES.length) | 0];
    obstacles.push({
      x: W + 40, y: GROUND_Y, w: o.w, h: o.h, emoji: o.emoji, name: o.name, hit: false
    });
  }
  function spawnItem() {
    var c = COLLECTIBLES[weightedItem()];
    // either low (crawl height) or high (needs a jump)
    var high = Math.random() < 0.5;
    var y = high ? GROUND_Y - 120 - Math.random() * 40 : GROUND_Y - 18;
    items.push({ x: W + 30, y: y, r: 18, emoji: c.emoji, points: c.points, name: c.name, taken: false, bob: Math.random() * 6.28 });
  }
  function weightedItem() {
    // rarer high-value items
    var r = Math.random();
    if (r < 0.45) return 0;   // bottle
    if (r < 0.72) return 1;   // teether
    if (r < 0.90) return 2;   // toy
    return 3;                 // DDIC chip (rare)
  }

  // ---------- Particles ----------
  function burst(x, y, color) {
    for (var i = 0; i < 8; i++) {
      var a = Math.random() * 6.28, sp = 60 + Math.random() * 120;
      particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 0.5, color: color });
    }
  }

  // ---------- Collision ----------
  function babyBox() {
    // crawling baby hitbox (a bit forgiving)
    return { x: baby.x - 28, y: baby.y - 42, w: 66, h: 42 };
  }
  function overlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // ---------- Update ----------
  var lastT = 0;
  function loop(now) {
    if (state !== "playing") return;
    var dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    // speed ramps up slowly
    speed = Math.min(MAX_SPEED, speed + dt * 9);
    var move = speed * dt;
    world.scroll += move;
    dist += move / 6;   // 6px ≈ 1 "公分"

    // baby physics
    baby.vy += GRAVITY * dt;
    baby.y += baby.vy * dt;
    if (baby.y >= GROUND_Y) { baby.y = GROUND_Y; baby.vy = 0; baby.onGround = true; }
    baby.anim += dt * (baby.onGround ? 10 : 4);
    if (baby.squash > 0) baby.squash = Math.max(0, baby.squash - dt * 2);
    if (invuln > 0) invuln -= dt;
    if (faceTimer > 0) { faceTimer -= dt; if (faceTimer <= 0) pickFace(); }
    if (shake > 0) shake = Math.max(0, shake - dt * 60);
    if (flash > 0) flash = Math.max(0, flash - dt * 2.5);

    // spawn
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnObstacle();
      spawnTimer = 1.1 + Math.random() * 1.0 - (speed - BASE_SPEED) / 1400;
      if (spawnTimer < 0.7) spawnTimer = 0.7;
    }
    itemTimer -= dt;
    if (itemTimer <= 0) {
      spawnItem();
      itemTimer = 0.6 + Math.random() * 0.9;
    }

    // move & cull obstacles
    for (var i = obstacles.length - 1; i >= 0; i--) {
      var o = obstacles[i];
      o.x -= move;
      if (o.x + o.w < -40) { obstacles.splice(i, 1); continue; }
      if (!o.hit && invuln <= 0) {
        var ob = { x: o.x - o.w / 2, y: o.y - o.h, w: o.w, h: o.h };
        if (overlap(babyBox(), ob)) {
          o.hit = true;
          hearts--;
          invuln = 1.1;
          shake = 16; flash = 1;
          upsetFace();
          baby.vy = -380;            // small recoil hop
          baby.onGround = false;
          burst(baby.x, baby.y - 24, "#f08a3c");
          blip(160, 0.25, "sawtooth", 0.07);
          updateHUD();
          showToast("哎呀！撞到" + o.name + "了 💦");
          if (hearts <= 0) { gameOver(); return; }
        }
      }
    }

    // move & collect items
    for (var j = items.length - 1; j >= 0; j--) {
      var it = items[j];
      it.x -= move;
      it.bob += dt * 4;
      if (!it.taken) {
        var mdx = baby.x - it.x, mdy = (baby.y - 22) - it.y, md = Math.sqrt(mdx*mdx + mdy*mdy);
        if (md < 95 && md > 0.1) { it.x += mdx/md * 220 * dt; it.y += mdy/md * 220 * dt; }
      }
      if (it.x + it.r < -30) { items.splice(j, 1); continue; }
      if (!it.taken) {
        var bb = babyBox();
        var cx = it.x, cy = it.y + Math.sin(it.bob) * 4;
        // circle-rect-ish check
        if (cx > bb.x - it.r && cx < bb.x + bb.w + it.r && cy > bb.y - it.r && cy < bb.y + bb.h + it.r) {
          it.taken = true;
          score += it.points;
          happyFace();
          dist += it.points * 0.4;  // collecting also nudges distance
          popups.push({ x: cx, y: cy - 10, text: "+" + it.points, life: 0.9, color: "#ffd23f" });
          burst(cx, cy, "#ffd23f");
          for (var sp = 0; sp < 6; sp++) { var sa = Math.random() * 6.28, ss = 50 + Math.random() * 100; particles.push({ x: cx, y: cy, vx: Math.cos(sa) * ss, vy: Math.sin(sa) * ss - 30, life: 0.55, color: "#fff3b0", star: true }); }
          particles.push({ x: cx, y: cy, vx: (Math.random() - 0.5) * 30, vy: -55, g: -10, life: 0.85, heart: true, color: "rgba(255,140,165,0.95)", sz: 6 });
          blip(820 + it.points * 6, 0.1, "sine", 0.06);
          showToast("+" + it.points + " " + it.name + "！");
          items.splice(j, 1);
          updateHUD();
        }
      }
    }

    // milestones
    if (milestoneIdx < MILESTONES.length && dist >= MILESTONES[milestoneIdx].d) {
      var ms = MILESTONES[milestoneIdx];
      showToast(ms.msg);
      blip(990, 0.2, "triangle", 0.06);
      var cfc = ["#ff6b6b", "#ffd23f", "#4ade80", "#5c94fc", "#f78fb3"];
      for (var cf = 0; cf < 30; cf++) { var ca = Math.random() * 6.28, cs = 90 + Math.random() * 170; particles.push({ x: W / 2, y: 60, vx: Math.cos(ca) * cs, vy: Math.sin(ca) * cs - 70, g: 360, life: 1.2, confetti: true, color: cfc[(Math.random() * 5) | 0] }); }
      if (ms.msg.indexOf("生日") >= 0) { coolMode = true; showToast("解鎖：柏宇酷酷墨鏡 😎"); }
      milestoneIdx++;
    }

    // ambient cuteness: sky twinkles + heart trail
    if (Math.random() < 0.06) particles.push({ x: Math.random() * W, y: 40 + Math.random() * 170, vx: 0, vy: 0, g: 0, life: 0.6, color: "#ffffff", star: true, sz: 3.5 });
    if (Math.random() < 0.03) particles.push({ x: baby.x + 8, y: baby.y - 78, vx: (Math.random() - 0.5) * 20, vy: -42 - Math.random() * 28, g: -30, life: 0.95, color: "rgba(255,150,175,0.95)", heart: true, sz: 7 });

    // particles
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.life -= dt;
      pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.vy += (pt.g == null ? 600 : pt.g) * dt;
      if (pt.life <= 0) particles.splice(p, 1);
    }
    for (var q = popups.length - 1; q >= 0; q--) {
      popups[q].life -= dt; popups[q].y -= 30 * dt;
      if (popups[q].life <= 0) popups.splice(q, 1);
    }

    updateHUD();
  }

  function gameOver() {
    state = "over";
    hud.classList.add("hidden");
    var total = Math.floor(dist);
    finalScoreEl.textContent = total;
    if (total > best) { best = total; localStorage.setItem("baiyu_best", String(best)); }
    bestScoreEl.textContent = best;

    // badge based on distance — playful "future achievement" tie-in
    var badge;
    if (total >= 4000)      badge = "🏆 傳說級爬行冠軍";
    else if (total >= 2500) badge = "🚀 爬行火箭寶寶";
    else if (total >= 1500) badge = "🌟 客廳探險家";
    else if (total >= 800)  badge = "🦷 固齒器收藏家";
    else if (total >= 300)  badge = "🍼 奶瓶獵人";
    else                    badge = "🐣 新手爬行員";
    badgeLineEl.textContent = "獲得徽章：" + badge;

    overTitleEl.textContent = total > 1018 ? "柏宇今天超級棒！" : "柏宇累累要休息～";
    overFaceEl.style.backgroundImage = "url('" + ((currentFace && currentFace.src) || BABY_FACES[0]) + "')";
    overScreen.classList.remove("hidden");
    blip(220, 0.4, "sine", 0.07);
  }

  // ---------- Render ----------
  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    drawBackground();
    drawGround();
    for (var i = 0; i < items.length; i++) drawItem(items[i]);
    for (var o = 0; o < obstacles.length; o++) drawObstacle(obstacles[o]);
    drawBaby();
    drawParticles();
    drawPopups();
    ctx.restore();
    if (flash > 0) {
      ctx.save();
      ctx.globalAlpha = flash * 0.5;
      ctx.fillStyle = "#ff5a5a";
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }
  function drawPopups() {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 26px -apple-system, sans-serif";
    for (var i = 0; i < popups.length; i++) {
      var p = popups[i];
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 1.5));
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawBackground() {
    if (!skyGrad) {
      skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      skyGrad.addColorStop(0, "#5c94fc");
      skyGrad.addColorStop(1, "#bfe7ff");
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // cheerful smiling sun with slowly spinning rays
    var sx = 92, sy = 118, sr = 30;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.fillStyle = "rgba(255,221,87,0.5)";
    ctx.rotate(world.scroll * 0.002);
    for (var ry = 0; ry < 12; ry++) { ctx.rotate(Math.PI / 6); ctx.fillRect(sr + 4, -3, 13, 6); }
    ctx.restore();
    ctx.fillStyle = "#ffd23f";
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,130,130,0.5)";
    ctx.beginPath(); ctx.arc(sx - 15, sy + 5, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + 15, sy + 5, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#e0972f";
    ctx.beginPath(); ctx.arc(sx - 10, sy - 4, 3.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + 10, sy - 4, 3.4, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = "#e0972f"; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(sx, sy + 3, 11, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();

    // far hills (lightest + slowest = atmospheric depth)
    var of0 = (world.scroll * 0.06) % 620;
    ctx.fillStyle = "#acdaa0";
    for (var a = -1; a < W / 620 + 1; a++) {
      var xa = a * 620 - of0;
      hill(xa + 160, GROUND_Y, 220, 112);
      hill(xa + 470, GROUND_Y, 160, 82);
    }
    // mid hills
    var of1 = (world.scroll * 0.12) % 540;
    ctx.fillStyle = "#82cc63";
    for (var b = -1; b < W / 540 + 1; b++) {
      var xb = b * 540 - of1;
      hill(xb + 140, GROUND_Y, 172, 96);
      hill(xb + 410, GROUND_Y, 122, 66);
    }
    // near bushes (darkest + fastest)
    var of2 = (world.scroll * 0.4) % 380;
    ctx.fillStyle = "#3f9e44";
    for (var c = -1; c < W / 380 + 1; c++) {
      var xc = c * 380 - of2;
      bush(xc + 70, GROUND_Y, 60);
      bush(xc + 250, GROUND_Y, 42);
    }
    // fluffy clouds
    var of3 = (world.scroll * 0.2) % 470;
    for (var d = -1; d < W / 470 + 1; d++) {
      var xd = d * 470 - of3;
      cloud(xd + 100, 86, 1.0);
      cloud(xd + 330, 150, 0.72);
    }
  }
  function hill(cx, baseY, w, h) {
    ctx.beginPath();
    ctx.moveTo(cx - w, baseY);
    ctx.quadraticCurveTo(cx, baseY - h * 2.1, cx + w, baseY);
    ctx.closePath(); ctx.fill();
  }
  function bush(cx, baseY, w) {
    ctx.beginPath();
    ctx.arc(cx - w * 0.6, baseY - 12, 16, 0, Math.PI * 2);
    ctx.arc(cx, baseY - 22, 22, 0, Math.PI * 2);
    ctx.arc(cx + w * 0.6, baseY - 12, 16, 0, Math.PI * 2);
    ctx.fillRect(cx - w * 0.6, baseY - 18, w * 1.2, 18);
    ctx.fill();
  }
  function cloud(x, y, s) {
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(x, y, 22 * s, 0, Math.PI * 2);
    ctx.arc(x + 24 * s, y + 5 * s, 17 * s, 0, Math.PI * 2);
    ctx.arc(x - 24 * s, y + 6 * s, 15 * s, 0, Math.PI * 2);
    ctx.arc(x + 4 * s, y - 12 * s, 16 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGround() {
    var gh = H - GROUND_Y;
    // grass cap
    ctx.fillStyle = "#74d65c";
    ctx.fillRect(0, GROUND_Y, W, 15);
    ctx.fillStyle = "#52b840";
    ctx.fillRect(0, GROUND_Y + 15, W, 6);
    // contact shadow seating the ground
    ctx.fillStyle = "rgba(40,25,10,0.16)";
    ctx.fillRect(0, GROUND_Y + 21, W, 3);
    // dirt body (cached gradient)
    if (!dirtGrad) {
      dirtGrad = ctx.createLinearGradient(0, GROUND_Y + 24, 0, H);
      dirtGrad.addColorStop(0, "#e8964a");
      dirtGrad.addColorStop(1, "#c4702a");
    }
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(0, GROUND_Y + 24, W, H - GROUND_Y - 24);
    // running-bond bricks with bevel
    var bw = 64, bh = (gh - 24) / 2, off = world.scroll % bw;
    for (var row = 0; row < 2; row++) {
      var ry = GROUND_Y + 24 + row * bh;
      var shift = (row % 2) * (bw / 2);
      for (var bx = -bw - off - shift; bx < W + bw; bx += bw) {
        ctx.fillStyle = "rgba(255,220,170,0.30)";
        ctx.fillRect(bx + 2, ry + 2, bw - 4, 3);
        ctx.fillStyle = "rgba(120,68,18,0.28)";
        ctx.fillRect(bx + 2, ry + bh - 4, bw - 4, 3);
        ctx.strokeStyle = "rgba(120,68,18,0.40)"; ctx.lineWidth = 2;
        ctx.strokeRect(bx + 1, ry + 1, bw - 2, bh - 2);
      }
    }
    // crisp grass blades
    ctx.fillStyle = "#8fe878";
    var goff = world.scroll % 26;
    for (var gx = -goff; gx < W; gx += 26) {
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y); ctx.lineTo(gx + 4, GROUND_Y - 6); ctx.lineTo(gx + 8, GROUND_Y);
      ctx.fill();
    }
  }

  function drawItem(it) {
    var y = it.y + Math.sin(it.bob) * 5;
    var spin = Math.abs(Math.cos(it.bob * 1.1)) * 0.82 + 0.18;  // 3D coin spin
    if (!coinGlow) {
      coinGlow = ctx.createRadialGradient(0, 0, 2, 0, 0, 34);
      coinGlow.addColorStop(0, "rgba(255,236,140,0.6)");
      coinGlow.addColorStop(1, "rgba(255,236,140,0)");
    }
    ctx.save();
    ctx.translate(it.x, y);
    // glow (cached gradient, translated)
    ctx.fillStyle = coinGlow;
    ctx.beginPath(); ctx.arc(0, 0, 34, 0, Math.PI * 2); ctx.fill();
    ctx.scale(spin, 1);
    // outer rim + gold face
    ctx.fillStyle = "#e6a817";
    ctx.beginPath(); ctx.arc(0, 0, it.r + 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffcf33";
    ctx.beginPath(); ctx.arc(0, 0, it.r + 1, 0, Math.PI * 2); ctx.fill();
    // bright top-left rim highlight
    ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#fff3b0";
    ctx.beginPath(); ctx.arc(0, 0, it.r - 1, Math.PI * 1.05, Math.PI * 1.55); ctx.stroke();
    // white inset disc so the icon pops
    ctx.fillStyle = "#fffbe8";
    ctx.beginPath(); ctx.arc(0, 0, it.r * 0.66, 0, Math.PI * 2); ctx.fill();
    // themed emoji
    ctx.font = (it.r * 1.05) + "px serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(it.emoji, 0, 1);
    ctx.restore();
    // moving specular sweep
    ctx.save();
    ctx.globalAlpha = 0.7 * spin;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(it.x - it.r * 0.4 * spin, y - it.r * 0.35, 2.5, it.r * 0.5, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawObstacle(o) {
    var bob = Math.sin((world.scroll + o.x) * 0.03) * 3;
    ctx.save();
    if (o.hit) ctx.globalAlpha = 0.4;
    // dark hazard base on the ground
    ctx.fillStyle = "#5a3a18";
    roundRectPath(o.x - o.w * 0.58, o.y - 7, o.w * 1.16, 13, 5); ctx.fill();
    // contact shadow
    ctx.fillStyle = "rgba(40,25,10,0.28)";
    ctx.beginPath(); ctx.ellipse(o.x, o.y + 5, o.w * 0.6, 6, 0, 0, Math.PI * 2); ctx.fill();
    // bigger emoji so it reads at a glance
    ctx.font = (o.h * 1.4) + "px serif";
    ctx.textAlign = "center"; ctx.textBaseline = "bottom";
    ctx.fillText(o.emoji, o.x, o.y + 4 + bob);
    // pulsing RED hazard ring — clearly "avoid", not a coin
    var lw = 3.5 + 1.8 * Math.sin(world.scroll * 0.2);
    ctx.lineWidth = lw < 1 ? 1 : lw;
    ctx.strokeStyle = "rgba(235,35,35,0.92)";
    ctx.beginPath();
    ctx.ellipse(o.x, o.y - o.h * 0.55 + bob, o.w * 0.66, o.h * 0.82, 0, 0, Math.PI * 2);
    ctx.stroke();
    // warning sign bobbing above the hazard
    ctx.font = "26px serif";
    ctx.textBaseline = "middle";
    ctx.fillText("⚠️", o.x, o.y - o.h * 1.5 - 6 + Math.sin(world.scroll * 0.12) * 3);
    ctx.restore();
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.ring) {
        ctx.globalAlpha = Math.max(0, p.life / p.ml);
        ctx.lineWidth = 3; ctx.strokeStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r0 * (1 - p.life / p.ml), 0, Math.PI * 2); ctx.stroke();
        continue;
      }
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2));
      ctx.fillStyle = p.color;
      if (p.star) {
        ctx.save();
        ctx.translate(p.x, p.y); ctx.rotate(p.life * 9);
        ctx.beginPath();
        for (var s = 0; s < 8; s++) { var rr = (s % 2) ? 2 : (p.sz || 5.5), aa = s * Math.PI / 4; ctx.lineTo(Math.cos(aa) * rr, Math.sin(aa) * rr); }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      } else if (p.heart) {
        drawHeart(p.x, p.y, p.sz || 7);
      } else if (p.confetti) {
        ctx.save();
        ctx.translate(p.x, p.y); ctx.rotate(p.x * 0.12 + p.life * 6);
        ctx.fillRect(-3, -4, 6, 8);
        ctx.restore();
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz || 4, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
  function drawHeart(x, y, s) {
    ctx.beginPath();
    ctx.arc(x - s * 0.5, y - s * 0.3, s * 0.5, 0, Math.PI * 2);
    ctx.arc(x + s * 0.5, y - s * 0.3, s * 0.5, 0, Math.PI * 2);
    ctx.moveTo(x - s, y - s * 0.05);
    ctx.lineTo(x, y + s * 0.9);
    ctx.lineTo(x + s, y - s * 0.05);
    ctx.closePath(); ctx.fill();
  }

  // ---------- Cute baby (canvas vector) ----------
  function drawBaby() {
    var x = baby.x, y = baby.y;
    var blink = (invuln > 0 && Math.floor(invuln * 12) % 2 === 0);

    // soft drop shadow on the ground
    ctx.fillStyle = "rgba(40,30,15,0.18)";
    var shScale = baby.onGround ? 1 : 0.7;
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y + 6, 44 * shScale, 8 * shScale, 0, 0, Math.PI * 2);
    ctx.fill();

    // crawl dust puffs
    if (state === "playing" && baby.onGround && Math.random() < 0.3) {
      particles.push({ x: x - 22, y: GROUND_Y + 2, vx: -(40 + Math.random() * 30), vy: -15 - Math.random() * 20, life: 0.4, color: "rgba(225,205,170,0.9)", sz: 3 });
    }

    ctx.save();
    if (blink) ctx.globalAlpha = 0.55;
    var swing = Math.sin(baby.anim) * 7;
    var squash = 1 - baby.squash * 0.35;
    ctx.translate(x, y);
    ctx.scale(-1, squash);   // face right (direction of travel)

    // back legs (behind body)
    ctx.lineCap = "round";
    ctx.strokeStyle = "#f0b88c"; ctx.lineWidth = 14;
    leg(16, -10, -swing);
    ctx.strokeStyle = "#f6c9a0";
    leg(22, -10, swing);

    // chunky onesie body
    ctx.fillStyle = "#5fb3c9";
    roundRectPath(-36, -30, 72, 34, 17); ctx.fill();
    ctx.fillStyle = "#8fd6e8";
    roundRectPath(-36, -36, 72, 34, 17); ctx.fill();
    // belly highlight + buttons
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.ellipse(2, -20, 15, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffd23f";
    ctx.beginPath(); ctx.arc(-6, -13, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, -13, 3, 0, Math.PI * 2); ctx.fill();

    // front arms reaching forward
    ctx.strokeStyle = "#f6c9a0"; ctx.lineWidth = 13;
    arm(-28, -22, 6 + swing);
    arm(-20, -22, 6 - swing);

    // head — photo of 柏宇, slim ring, anchored on the body
    var hr = 42;
    var hx = -26, hy = -54 + Math.sin(baby.anim) * 1.5;
    if (currentFace && currentFace.complete) {
      // neck/overlap shadow into torso
      ctx.fillStyle = "rgba(40,30,15,0.10)";
      ctx.beginPath(); ctx.ellipse(hx + 4, hy + hr - 2, hr * 0.7, 6, 0, 0, Math.PI * 2); ctx.fill();
      // slim white ring
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(hx, hy, hr + 3, 0, Math.PI * 2); ctx.fill();
      // photo (un-mirror so the face isn't flipped by the body's facing)
      ctx.save();
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI * 2); ctx.clip();
      ctx.translate(hx, hy); ctx.scale(-1, 1);
      ctx.drawImage(currentFace, -hr, -hr, hr * 2, hr * 2);
      ctx.restore();
      // thin gold accent
      ctx.lineWidth = 2.5; ctx.strokeStyle = "#ffcf33";
      ctx.beginPath(); ctx.arc(hx, hy, hr + 1.5, 0, Math.PI * 2); ctx.stroke();
      if (coolMode) {
        ctx.fillStyle = "#222";
        ctx.fillRect(hx - 20, hy - 6, 16, 11);
        ctx.fillRect(hx + 4, hy - 6, 16, 11);
        ctx.fillRect(hx - 4, hy - 2, 8, 3);
      }
    } else {
      ctx.fillStyle = "#fbd7b3";
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(244,138,138,0.45)";
      ctx.beginPath(); ctx.arc(hx - 12, hy + 6, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4a3a2a";
      ctx.beginPath(); ctx.arc(hx - 9, hy - 3, 3.4, 0, Math.PI * 2); ctx.fill();
    }

    ctx.restore();

    function leg(ox, oy, ph) {
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(ox + 12, oy + 14 + ph * 0.5);
      ctx.stroke();
    }
    function arm(ox, oy, ph) {
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(ox - 8, oy + 18 + ph);
      ctx.stroke();
    }
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---------- Idle splash render on start ----------
  function idleRender() {
    if (state === "start") {
      reset(); render(); reset();
    }
  }
  bestScoreEl.textContent = best;
  idleRender();

  window.addEventListener("resize", function () { sizeWrap(); fitCanvas(); });
  window.addEventListener("orientationchange", function () { sizeWrap(); fitCanvas(); });
})();
</script>
</body>
</html>
